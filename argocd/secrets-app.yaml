apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ankitanki007/ecommerce-minikube
    targetRevision: main
    path: secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: ecommerce
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
