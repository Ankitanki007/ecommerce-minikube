apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: ankitdevops02/order-service:1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3003
        env:
        # ⭐ K8s DNS: service-name.namespace resolves automatically
        - name: USER_SERVICE_URL
          value: "http://user-service.ecommerce.svc.cluster.local:3001"
        - name: PRODUCT_SERVICE_URL
          value: "http://product-service.ecommerce.svc.cluster.local:3002"
        readinessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: ecommerce
spec:
  selector:
    app: order-service
  # NodePort = accessible from your laptop browser
  type: NodePort
  ports:
  - port: 3003
    targetPort: 3003
    nodePort: 30003   # Fixed port on Minikube node
